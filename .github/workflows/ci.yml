name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install --upgrade pip
      - run: pip install -e .[dev]
      - run: ruff format --check .
      - run: ruff check .
      - run: pytest -q
      - run: python scripts/generate_synthetic_data.py --config configs/quick.yaml
      - run: python scripts/train_soc_models.py --config configs/quick.yaml
      - run: python scripts/generate_report.py --results results/
